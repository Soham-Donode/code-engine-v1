services:

  # --- THE NEW BOUNCER ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80" # NGINX listens openly to the outside world on port 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Mounts the file we just created
    depends_on:
      - engine

  # --- YOUR GO BACKEND ---
  engine:
    build: .
    # CHANGED: Use 'expose' instead of 'ports'. 
    # This completely hides port 8080 from your Mac, exposing it ONLY to NGINX internally.
    expose:
      - "8080" 
    environment:
      - REDIS_URL=redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - postgres
  postgres:
    image: postgres:15-alpine
    container_name: engine_postgres
    environment:
      POSTGRES_USER: engine_user
      POSTGRES_PASSWORD: engine_password
      POSTGRES_DB: code_engine
    ports:
      - "5435:5432" # <-- Map external port 5435 on your Mac to internal port 5432 in Docker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: engine_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: