<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Code Engine</title>
    <style>
      :root {
        --bg-main: #0a0a0a;
        --bg-panel: #1e1e1e;
        --bg-header: #2d2d2d;
        --border: #3e3e42;
        --text-primary: #d4d4d4;
        --text-muted: #858585;
        --accent: #007acc;
        --accent-hover: #0098ff;
        --success: #4caf50;
        --error: #f44336;
        --warning: #ff9800;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-main);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Navbar */
      .navbar {
        height: 50px;
        background-color: var(--bg-header);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
      }

      .logo {
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 0.5px;
      }

      .controls {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      select {
        background-color: var(--bg-panel);
        color: var(--text-primary);
        border: 1px solid var(--border);
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
        outline: none;
        cursor: pointer;
      }

      button {
        background-color: var(--accent);
        color: white;
        border: none;
        padding: 7px 20px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      button:hover {
        background-color: var(--accent-hover);
      }

      button:disabled {
        background-color: var(--border);
        color: var(--text-muted);
        cursor: not-allowed;
      }

      /* Main Workspace Layout */
      .workspace {
        display: flex;
        flex: 1;
        height: calc(100vh - 50px);
      }

      /* Left Pane: Editor */
      .editor-pane {
        flex: 3;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background-color: var(--bg-panel);
      }

      /* Right Pane: Input & Output */
      .io-pane {
        flex: 2;
        display: flex;
        flex-direction: column;
        background-color: var(--bg-main);
      }

      .pane-header {
        background-color: var(--bg-header);
        padding: 8px 15px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .io-section {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .io-section:first-child {
        border-bottom: 1px solid var(--border);
      }

      textarea {
        flex: 1;
        width: 100%;
        background-color: transparent;
        color: var(--text-primary);
        border: none;
        padding: 15px;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 14px;
        line-height: 1.5;
        resize: none;
        outline: none;
      }

      #codeEditor {
        background-color: var(--bg-panel);
      }

      #stdinEditor {
        background-color: var(--bg-main);
      }

      /* Output Formatting */
      .output-content {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .status-badge {
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        background: var(--border);
        color: white;
      }

      .status-queued {
        background-color: var(--warning);
        color: #000;
      }
      .status-running {
        background-color: var(--accent);
      }
      .status-completed {
        background-color: var(--success);
      }
      .status-error,
      .status-timeout {
        background-color: var(--error);
      }

      .stderr-text {
        color: var(--error);
        margin-top: 10px;
        border-top: 1px dashed var(--border);
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="logo">&lt;/&gt; Code Engine</div>
      <div class="controls">
        <select id="language">
          <option value="python">Python 3.9</option>
          <option value="cpp">C++ (GCC)</option>
        </select>
        <button id="runBtn" onclick="submitCode()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          Run
        </button>
      </div>
    </div>

    <div class="workspace">
      <div class="editor-pane">
        <div class="pane-header">main.<span id="extLabel">py</span></div>
        <textarea
          id="codeEditor"
          spellcheck="false"
          placeholder="# Write your code here..."
        ></textarea>
      </div>

      <div class="io-pane">
        <div class="io-section">
          <div class="pane-header">Standard Input (stdin)</div>
          <textarea
            id="stdinEditor"
            spellcheck="false"
            placeholder="Enter input data here (optional)..."
          ></textarea>
        </div>

        <div class="io-section">
          <div class="pane-header">
            <div>
              Output
              <span
                id="statusBadge"
                class="status-badge"
                style="display: none"
              ></span>
            </div>
            <div
              id="metaInfo"
              style="font-weight: normal; color: var(--text-muted)"
            ></div>
          </div>
          <div id="outputContent" class="output-content">
            <span style="color: var(--text-muted)"
              >Run your code to see the output here.</span
            >
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost"; // Points to NGINX Docker container

      // Simple UI update when language changes
      document
        .getElementById("language")
        .addEventListener("change", function (e) {
          document.getElementById("extLabel").innerText =
            e.target.value === "python" ? "py" : "cpp";
        });

      async function submitCode() {
        const code = document.getElementById("codeEditor").value;
        const input = document.getElementById("stdinEditor").value; // <-- NEW: Grab Stdin
        const language = document.getElementById("language").value;
        const runBtn = document.getElementById("runBtn");
        const outContent = document.getElementById("outputContent");

        if (!code.trim()) {
          alert("Please enter some code before running.");
          return;
        }

        // Lock UI
        runBtn.disabled = true;
        runBtn.innerHTML = "Running...";
        updateStatus("queued");
        outContent.innerHTML =
          '<span style="color: var(--text-muted);">Submitting to execution queue...</span>';
        document.getElementById("metaInfo").innerText = "";

        try {
          // Send Payload (Now includes the `input` field)
          const response = await fetch(`${API_BASE}/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ language, code, input }),
          });

          if (!response.ok) throw new Error("Server rejected request");

          const data = await response.json();
          pollStatus(data.submission_id);
        } catch (err) {
          outContent.innerHTML = `<span style="color: var(--error);">Network Error: Could not connect to API Gateway.</span>`;
          resetButton();
        }
      }

      async function pollStatus(id) {
        const outContent = document.getElementById("outputContent");
        const evtSource = new EventSource(`${API_BASE}/stream/${id}`);

        evtSource.onmessage = function (event) {
          const data = JSON.parse(event.data);
          updateStatus(data.status);

          if (data.status === "running") {
            outContent.innerHTML =
              '<span style="color: var(--accent);">Executing code in secure sandbox...</span>';
          }

          if (
            data.status === "completed" ||
            data.status === "error" ||
            data.status === "timeout"
          ) {
            evtSource.close();
            resetButton();

            // Render Output
            let html = "";
            if (data.stdout) {
              html += escapeHTML(data.stdout);
            } else if (data.status === "timeout") {
              html += `<span class="stderr-text">Process killed: Time limit exceeded (5000ms).</span>`;
            } else if (!data.stderr) {
              html += `<span style="color: var(--text-muted);">Process finished with no output.</span>`;
            }

            // Render Errors
            if (data.stderr) {
              html += `<div class="stderr-text">${escapeHTML(data.stderr)}</div>`;
            }

            outContent.innerHTML = html;

            // Render Execution Time
            if (data.execution_time_ms !== null) {
              document.getElementById("metaInfo").innerText =
                `${data.execution_time_ms}ms`;
            }
          }
        };

        evtSource.onerror = function () {
          evtSource.close();
          resetButton();
          outContent.innerHTML += `<br><span style="color: var(--error);">Stream connection lost.</span>`;
        };
      }

      function updateStatus(status) {
        const badge = document.getElementById("statusBadge");
        badge.style.display = "inline-block";
        badge.innerText = status.toUpperCase();
        badge.className = `status-badge status-${status}`;
      }

      function resetButton() {
        const btn = document.getElementById("runBtn");
        btn.disabled = false;
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Run`;
      }

      // Utility to prevent XSS in output
      function escapeHTML(str) {
        return str.replace(
          /[&<>'"]/g,
          (tag) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              "'": "&#39;",
              '"': "&quot;",
            })[tag] || tag,
        );
      }
    </script>
  </body>
</html>
