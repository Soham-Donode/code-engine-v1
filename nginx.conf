events {
    worker_connections 1024;
}

http {
    # 1. Create a memory zone named 'apilimit' to track user IP addresses.
    # 10m = 10 megabytes of memory (tracks ~160,000 IPs). 
    # rate=2r/s = strictly limits users to 2 requests per second.
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=2r/s;

    # 2. Tell NGINX where your Go server lives inside the Docker network
    upstream go_backend {
        server engine:8080; 
    }

    server {
        listen 80;

        # --- Route 1: The Submit Endpoint (Rate Limited) ---
        location /submit {
            # Apply the rate limit. Allow a rapid "burst" of 5 clicks before blocking.
            limit_req zone=apilimit burst=5 nodelay;
            
            proxy_pass http://go_backend/submit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Route 2: The SSE Stream (No Rate Limit, No Buffering) ---
        location /stream/ {
            proxy_pass http://go_backend/stream/;
            
            # CRITICAL: Disable NGINX buffering so it doesn't trap your real-time Redis updates!
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # Catch-all for CORS preflight (OPTIONS) requests
        location / {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}